name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'

jobs:
  # Zero-dep, <2s — runs fastest, fails loudest on config drift.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: CONFIG schema validation
        run: node scripts/validate-config.mjs

  # Design-token policy. Needs scripts/ dev deps.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json
      - name: Install dev dependencies
        run: cd scripts && npm ci
      - name: Stylelint — design system compliance
        run: cd scripts && npm run lint

  # Slowest (Playwright). Isolated so lint/validate fail fast without waiting.
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json
      - name: Install dev dependencies
        run: cd scripts && npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('scripts/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd scripts && npx playwright install --with-deps chromium

      - name: Mobile smoke test (390x844)
        run: cd scripts && npm run smoke
