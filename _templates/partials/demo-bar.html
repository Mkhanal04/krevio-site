<!-- Demo Bar — shared across all demos -->
<div class="demo-bar">
  <a class="demo-bar-label" href="/about-these-demos/" aria-label="What is this demo?">Demo</a>
  <div class="demo-bar-title">
    <span class="dot"></span>
    <span class="demo-bar-name" id="demoBarName">{{BUSINESS_NAME}}</span>
  </div>
  <div class="demo-bar-spacer"></div>
  <div class="demo-bar-toggle">
    <button class="demo-bar-btn active" id="btnCustomer" onclick="switchView('customer')">Your Website</button>
    <button class="demo-bar-btn" id="btnOwner" onclick="switchView('owner')">Your Dashboard</button>
  </div>
  <button class="lang-toggle" id="langToggle" onclick="toggleLang()" aria-label="Toggle language"{{LANG_TOGGLE_STYLE}}>
    <span id="langEN" class="active-lang">EN</span> | <span id="langES">ES</span>
  </button>
  <button class="demo-bar-theme" id="themeBtn" onclick="toggleTheme()" aria-label="Toggle theme">{{THEME_ICON}}</button>
  <a href="{{BACK_URL}}" class="demo-bar-back">{{BACK_LABEL}}</a>
</div>
