<style>
/* ===================================================================
   SHARED DEMO STYLES
   Generated from _templates/base.html — tokens from krevio-tokens.css.

/* -- Reset -- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
img { max-width: 100%; display: block; }
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; }
a { text-decoration: none; color: inherit; }

/* -- Global base -- */
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg); color: var(--t0);
  line-height: 1.6; -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

/* -- Demo bar -- */
.demo-bar {
  position: fixed; top: 0; left: 0; right: 0; height: 40px; z-index: 200;
  background: var(--bg1); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 12px; font-size: 12px;
}
.demo-bar-label { font-size: 11px; font-weight: 600; color: var(--t2); letter-spacing: 0.04em; text-transform: uppercase; white-space: nowrap; }
.demo-bar-title { font-weight: 600; font-size: 12px; color: var(--t0); display: flex; align-items: center; gap: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.demo-bar-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; flex-shrink: 0; }
.demo-bar-spacer { flex: 1; min-width: 0; }
.demo-bar-toggle { display: flex; background: var(--bg2); border-radius: 6px; padding: 2px; gap: 1px; }
.demo-bar-btn { padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: 500; border: none; cursor: pointer; background: transparent; color: var(--t2); transition: all 0.15s; min-height: 36px; }
.demo-bar-btn.active { background: var(--bg1); color: var(--t0); box-shadow: var(--shadow-sm); }
.demo-bar-theme { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg2); color: var(--t1); font-size: 14px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; min-height: 36px; }
.demo-bar-theme:hover { background: var(--bg3); }
.demo-bar-back { font-size: 11px; color: var(--t2); padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); background: transparent; white-space: nowrap; }
.demo-bar-back:hover { background: var(--bg2); color: var(--t0); }
.lang-toggle { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 13px; color: var(--t2); cursor: pointer; font-weight: 500; }
.lang-toggle .active-lang { color: var(--accent); font-weight: 700; }

/* -- View switcher -- */
.customer-view, .owner-view { display: none; }
.customer-view.active, .owner-view.active { display: block; }

/* -- Customer view: hero -- */
.cv-hero {
  background: var(--hero-bg);
  padding: 80px 24px 72px; text-align: center; color: white;
  position: relative; overflow: hidden;
}
.cv-hero::before {
  content: ''; position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.cv-hero-inner { max-width: 640px; margin: 0 auto; position: relative; }
.cv-hero-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px; padding: 4px 14px; font-size: 13px; font-weight: 500;
  margin-bottom: 24px; color: rgba(255,255,255,0.9);
}
.cv-hero-badge .stars { color: #FCD34D; letter-spacing: 1px; }
.cv-hero h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(2.2rem, 5vw, 3.4rem);
  line-height: 1.1; margin-bottom: 16px; color: white;
}
.cv-hero-sub { font-size: 1.1rem; color: rgba(255,255,255,0.75); margin-bottom: 36px; max-width: 500px; margin-left: auto; margin-right: auto; }
.cv-hero-ctas { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 36px; }
.cv-hero-pills { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }
.cv-hero-pill {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.85);
}
.cv-hero-stats { display: flex; gap: 32px; justify-content: center; margin-top: 48px; flex-wrap: wrap; }
.cv-hero-stat { text-align: center; }
.cv-hero-stat-num { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: white; }
.cv-hero-stat-label { font-size: 12px; color: rgba(255,255,255,0.65); }
.btn-primary {
  padding: 12px 28px; background: white; color: var(--btn-primary-color, #134E4A);
  font-weight: 600; font-size: 14px; border-radius: 8px; border: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15); min-height: 44px;
  transition: transform 0.15s, box-shadow 0.15s;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
.btn-outline {
  padding: 12px 28px; background: transparent; color: white;
  font-weight: 500; font-size: 14px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.3); min-height: 44px;
  transition: background 0.15s, border-color 0.15s;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn-outline:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.5); }

/* -- Customer view: sections -- */
.cv-section { padding: 72px 24px; max-width: 1100px; margin: 0 auto; }
.cv-section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
.cv-section-title { font-family: 'DM Serif Display', serif; font-size: clamp(1.6rem, 3vw, 2.2rem); color: var(--t0); margin-bottom: 12px; line-height: 1.2; }
.cv-section-sub { font-size: 1rem; color: var(--t2); max-width: 520px; }
.section-header { text-align: center; }
.section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--accent); margin-bottom: 8px; }
.section-title { font-family: 'DM Serif Display', serif; font-size: clamp(1.6rem, 3vw, 2.2rem); color: var(--t0); margin-bottom: 8px; }
.section-sub { font-size: 1rem; color: var(--t2); margin-bottom: 36px; max-width: 540px; }

/* -- Customer view: services -- */
.cv-services-bg { background: var(--bg1); }
.services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 40px; max-width: 1000px; margin-left: auto; margin-right: auto; }
.service-card { background: var(--bg); box-shadow: var(--shadow-sm); border-radius: 16px; padding: 28px 24px; border: 1px solid var(--border); transition: box-shadow 0.25s, transform 0.25s; }
.service-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-3px); }
.service-icon { font-size: 2rem; margin-bottom: 16px; }
.service-name { font-weight: 700; font-size: 1rem; color: var(--t0); margin-bottom: 8px; }
.service-desc { font-size: 0.9rem; color: var(--t2); margin-bottom: 16px; line-height: 1.5; }
.service-price {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--accentS); color: var(--accent);
  border: 1px solid var(--accentB); border-radius: 6px;
  padding: 4px 10px; font-size: 12px; font-weight: 600; margin-bottom: 16px;
}
.service-features { list-style: none; }
.service-features li { font-size: 0.85rem; color: var(--t2); padding: 4px 0; display: flex; align-items: center; gap: 8px; }
.service-features li::before { content: '\2713'; color: var(--accent); font-weight: 700; flex-shrink: 0; }

/* -- Customer view: gallery -- */
.cv-gallery-bg { background: var(--bg2); }
.gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 1000px; margin: 0 auto; margin-top: 40px; }
.gallery-item { border-radius: 16px; overflow: hidden; background: var(--bg1); border: 1px solid var(--border); }
.gallery-before, .gallery-after { padding: 16px; }
.gallery-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.gallery-desc { font-size: 13px; color: var(--t2); }
.gallery-job { font-weight: 600; font-size: 13px; color: var(--t0); padding: 12px 16px 0; }
.gallery-loc { font-size: 12px; color: var(--t2); padding: 2px 16px 12px; }

/* -- Customer view: reviews -- */
.cv-reviews-bg { background: var(--bg); }
.reviews-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; max-width: 900px; margin: 0 auto; margin-top: 40px; }
.review-card { background: var(--bg1); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
.review-stars { color: #FCD34D; font-size: 14px; margin-bottom: 8px; }
.review-text { font-size: 14px; color: var(--t1); line-height: 1.6; margin-bottom: 12px; }
.review-name { font-size: 13px; font-weight: 600; color: var(--t0); }

/* -- Customer view: booking/lead form -- */
.cv-booking-bg { background: var(--bg2); }
.booking-card { max-width: 540px; margin: 0 auto; background: var(--bg1); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: var(--t0); margin-bottom: 6px; }
.form-input, .form-select {
  width: 100%; padding: 10px 14px; font-size: 16px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  color: var(--t0); transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus { border-color: var(--accent); outline: none; }
.form-textarea { min-height: 80px; resize: vertical; }
.tcpa-consent { margin: 16px 0; }
.form-checkbox-label { display: flex; gap: 8px; font-size: 11px; color: var(--t2); line-height: 1.4; cursor: pointer; }
.form-checkbox-label input[type="checkbox"] { flex-shrink: 0; margin-top: 2px; }
.btn-accent {
  width: 100%; padding: 12px; font-size: 15px; font-weight: 600;
  background: var(--accent); color: white; border: none; border-radius: 8px;
  cursor: pointer; transition: opacity 0.15s; min-height: 44px;
}
.btn-accent:hover { opacity: 0.9; }
.btn-accent:disabled { opacity: 0.5; cursor: not-allowed; }

/* -- Footer -- */
.cv-footer { background: var(--bg1); border-top: 1px solid var(--border); padding: 40px 24px 24px; }
.cv-footer-inner { max-width: 800px; margin: 0 auto; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 24px; }
.cv-footer-name { font-weight: 700; font-size: 16px; color: var(--t0); margin-bottom: 4px; }
.cv-footer-tagline { font-size: 13px; color: var(--t2); }
.cv-footer-items { display: flex; flex-direction: column; gap: 6px; }
.cv-footer-item { font-size: 13px; color: var(--t2); }
.cv-footer-item a { color: var(--accent); }
.cv-footer-credit { text-align: center; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 12px; color: var(--t3); }
.cv-footer-credit a { color: var(--t2); }

/* -- Krevio demo pill & endcap -- */
.krevio-demo-pill {
  position: fixed; bottom: 20px; right: 20px; z-index: 150;
  background: var(--bg1); border: 1px solid var(--border); border-radius: 999px;
  padding: 8px 16px; font-size: 12px; font-weight: 600; color: var(--t1);
  display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow-md);
  transition: transform 0.15s, box-shadow 0.15s;
}
.krevio-demo-pill a { color: inherit; text-decoration: none; }
.krevio-demo-pill:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
.krevio-demo-pill-x {
  width: 18px; height: 18px; border-radius: 50%; border: none; background: var(--bg2);
  color: var(--t2); font-size: 12px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; line-height: 1; padding: 0;
}
.krevio-demo-pill-x:hover { background: var(--bg3); color: var(--t0); }
.krevio-endcap {
  text-align: center; padding: 32px 16px; background: var(--bg1); border-top: 1px solid var(--border);
}
.krevio-endcap h4 { color: var(--t0); font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.krevio-endcap p { color: var(--t2); font-size: 13px; margin-bottom: 16px; }
.krevio-endcap a {
  display: inline-block; padding: 10px 24px; border-radius: 999px;
  background: var(--accent); color: var(--bg); font-size: 13px; font-weight: 600; text-decoration: none;
  transition: transform 0.15s;
}
.krevio-endcap a:hover { transform: translateY(-1px); }

/* -- Scroll reveal -- */
.reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.5s, transform 0.5s; }
.reveal.revealed { opacity: 1; transform: translateY(0); }

/* -- Toast -- */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--bg1); border: 1px solid var(--border); border-radius: 12px; padding: 12px 24px; font-size: 14px; color: var(--t0); box-shadow: var(--shadow-lg); z-index: 9999; transition: transform 0.3s; pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }

/* -- Mobile overrides -- */
@media (max-width: 600px) {
  .demo-bar-back span, .demo-bar-label span.full-label { display: none; }
  .demo-bar-btn { padding: 4px 8px; font-size: 10px; }
  .services-grid, .gallery-grid { grid-template-columns: 1fr; }
  .reviews-grid { grid-template-columns: 1fr; }
  .cv-hero { padding: 64px 16px 48px; }
  .cv-hero h1 { font-size: 1.8rem; }
  .cv-footer-inner { flex-direction: column; gap: 16px; }
  .krevio-demo-pill { bottom: 80px; right: 12px; font-size: 11px; padding: 6px 12px; }
}
